services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: matchbot-mongo
    restart: unless-stopped
    env_file: .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Weaviate ──────────────────────────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: matchbot-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"        # gRPC port (Weaviate v4 client)
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: matchbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"          # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MatchBot ──────────────────────────────────────────────────────────────────
  matchbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matchbot
    restart: unless-stopped
    env_file:
      - .env
      - .env.bot
    command: python -m telegram_llm_bot.main
    volumes:
      - type: bind
        source: ./logs
        target: /app/logs
    depends_on:
      mongo:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  mongo_data:
  weaviate_data:
  minio_data:
